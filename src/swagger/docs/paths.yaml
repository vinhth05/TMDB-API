paths:
  /health:
    get:
      summary: Check API Health
      tags: [Health]
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                status: UP
                tmdb: CONNECTED
                cache: OK
  /api/import/search:
    get:
      summary: Search Movies
      tags: [Search]
      security:
        - ApiKeyAuth: []
      parameters:
        - in: query
          name: keyword
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: language
          schema:
            type: string
        - in: query
          name: region
          schema:
            type: string
        - in: query
          name: includeAdult
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/import/search/suggestions:
    get:
      summary: Search Movie Suggestions (Autocomplete)
      tags: [Search]
      security:
        - ApiKeyAuth: []
      parameters:
        - in: query
          name: keyword
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/import/movies/{tmdbId}/bundle:
    get:
      summary: Complete Movie Import Bundle
      tags: [Movie Import]
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: tmdbId
          required: true
          schema:
            type: integer
        - in: query
          name: language
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/import/genres:
    get:
      summary: Get Reference Genres
      tags: [Reference Data]
      security:
        - ApiKeyAuth: []
      parameters:
        - in: query
          name: language
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/import/movies/{tmdbId}/release-dates:
    get:
      summary: Get Movie Release Dates
      tags: [Movie Resources]
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: tmdbId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/import/movies/{tmdbId}/translations:
    get:
      summary: Get Movie Translations
      tags: [Movie Resources]
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: tmdbId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/import/movies/{tmdbId}/external-ids:
    get:
      summary: Get Movie External IDs
      tags: [Movie Resources]
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: tmdbId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/import/discover/movies:
    get:
      summary: Discover Movies
      tags: [Movie Discovery]
      security:
        - ApiKeyAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: sortBy
          schema:
            type: string
            default: popularity.desc
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/tmdb/movies/latest-top10:
    get:
      summary: Get Top 10 Latest Movies
      tags: [Movie Lists]
      description: Returns the top 10 most recently added movies to TMDB (cached by background job).
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
            maximum: 10
          description: Number of movies to return (max 10)
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
